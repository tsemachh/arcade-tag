<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Arcade Tag" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="description" content="Minimalist arcade tag — chase, survive, and find your opponent by sound. Free, in your browser." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Arcade Tag" />
  <meta property="og:description" content="Chase, survive, and find your opponent by sound. Free, in your browser — with online play." />
  <meta property="og:url" content="https://tsemachh.github.io/arcade-tag/" />
  <meta property="og:image" content="https://tsemachh.github.io/arcade-tag/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Arcade Tag" />
  <meta name="twitter:description" content="Chase, survive, and find your opponent by sound." />
  <meta name="twitter:image" content="https://tsemachh.github.io/arcade-tag/og.png" />
  <title>Arcade Tag — תופסת ארקייד</title>
  <style>
    html, body { margin: 0; height: 100%; background: #111; display: flex;
                 align-items: center; justify-content: center; overflow: hidden; }
    canvas { background: #000; box-shadow: 0 0 24px rgba(0,0,0,.8);
             width: min(98vw, 800px); max-height: 96vh; height: auto;
             touch-action: none; }
  </style>
</head>
<body>
  <canvas id="arena" width="800" height="520"></canvas>
  <!-- PeerJS (WebRTC broker) for Phase 3 online multiplayer. Optional:
       if it fails to load, the game still runs offline (vs computer / local 2P). -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script src="game-core.js"></script>
  <script src="ai.js"></script>
  <script src="net.js"></script>
  <script src="game.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
